<header class="topbar">
  <a routerLink="/" [queryParams]="{ lang: activeLang }" class="brand" aria-label="JoinMe home">
    <img src="images/logo.png" alt="JoinMe logo" class="brand-logo" />
    <span class="brand-name">join-me</span>
  </a>

  <div class="top-actions">
    <nav class="top-links" aria-label="Main">
      <a routerLink="/faq" [queryParams]="{ lang: activeLang }" transloco="nav.faq">FAQ</a>
      <a routerLink="/safety" [queryParams]="{ lang: activeLang }" transloco="nav.safety">Safety</a>
    </nav>

    <a class="download-cta" href="#download" transloco="nav.download">Download</a>

    <div class="lang-menu">
      <select id="langSelector" [value]="activeLang" (change)="setLang($any($event.target).value)">
        <option value="en">EN</option>
        <option value="de">DE</option>
      </select>
    </div>
  </div>
</header>

<main class="app-main">
  <router-outlet />
</main>

<footer class="site-footer">
  <section id="download" class="footer-download" [attr.aria-label]="'footer.downloadAria' | transloco">
    <div>
      <h2 transloco="footer.downloadTitle">Get JoinMe</h2>
      <p transloco="footer.downloadText">Download the app and see who is nearby.</p>
    </div>

    <div class="footer-store-row">
      <a href="https://play.google.com/store" target="_blank" rel="noopener noreferrer">
        <img
          src="images/google-play.png"
          [alt]="'footer.googlePlayAlt' | transloco"
          class="store-badge"
        />
      </a>
      <a href="https://apps.apple.com/de/app/join-me/id6760857974" target="_blank" rel="noopener noreferrer">
        <img src="images/app-store.png" [alt]="'footer.appStoreAlt' | transloco" class="store-badge" />
      </a>
    </div>
  </section>

  <nav class="footer-links" aria-label="Footer">
    <a routerLink="/impressum" [queryParams]="{ lang: activeLang }" transloco="footer.impressumLink">Impressum</a>
    <a routerLink="/privacy-policy" [queryParams]="{ lang: activeLang }" transloco="footer.privacyLink">Privacy</a>
    <a routerLink="/terms" [queryParams]="{ lang: activeLang }" transloco="footer.termsLink">Terms</a>
    <a [href]="'/account-deletion/?lang=' + activeLang" transloco="footer.accountDeletionLink">Delete Account</a>
    <a href="mailto:support@join-me-app.com">support@join-me-app.com</a>
  </nav>
</footer>
