<header class="topbar">
  <a routerLink="/" class="brand" aria-label="Join-Me home">
    <img src="images/logo.png" alt="Join-Me logo" class="brand-logo" />
    <span class="brand-name">join-me</span>
  </a>

  <div class="top-actions">
    <nav class="top-links" aria-label="Main">
      <a routerLink="/faq" transloco="nav.faq">FAQ</a>
      <a routerLink="/safety" transloco="nav.safety">Safety</a>
    </nav>

    <div class="lang-menu">
      <select id="langSelector" [value]="activeLang" (change)="setLang($any($event.target).value)">
        <option value="en">EN</option>
        <option value="de">DE</option>
      </select>
    </div>
  </div>
</header>

<main class="app-main">
  <router-outlet />
</main>

<footer class="site-footer">
  <a routerLink="/privacy-policy" transloco="footer.privacyLink">Privacy</a>
  <a routerLink="/terms" transloco="footer.termsLink">Terms</a>
  <a href="mailto:support@join-me-app.com">support@join-me-app.com</a>
</footer>
